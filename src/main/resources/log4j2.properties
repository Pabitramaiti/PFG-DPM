
# Root logger level and appender
rootLogger.level = info
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.file.ref = LOGFILE

# STDOUT appender
appender.STDOUT.type = Console
appender.STDOUT.name = STDOUT
appender.STDOUT.layout.type = PatternLayout
appender.STDOUT.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS ZZZ} %-5p %c{1}:%L - %m%n

# Configure the rolling file appender
appender.LOGFILE.type = RollingFile
appender.LOGFILE.name = LOGFILE
appender.LOGFILE.fileName = logs/ebcdic.log
appender.LOGFILE.filePattern = logs/ebcdic-%d{yyyy-MM-dd}-%i.log.gz
appender.LOGFILE.layout.type = PatternLayout
appender.LOGFILE.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS Z} %-5p %c{1}:%L - %m%n
appender.LOGFILE.policies.type = Policies
appender.LOGFILE.policies.size.type = SizeBasedTriggeringPolicy
appender.LOGFILE.policies.size.size = 10MB
appender.LOGFILE.strategy.type = DefaultRolloverStrategy
appender.LOGFILE.strategy.max = 11

